server {
    listen 65278;   # 前端端口（自定义；80 被宿主机 nginx 占用）
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 前端单页路由：找不到文件时回退 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 反代后端（host 网络模式下后端在 127.0.0.1:65279）
    location /api/ {
        proxy_pass http://127.0.0.1:65279;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 650s;   # 容纳长命令
    }
}
